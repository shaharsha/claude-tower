<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A87C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4785C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#85D4A0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#85D4A0;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="signalGrad2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#85D4A0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#85D4A0;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1E1E2E" />

  <!-- Tower body -->
  <path d="M52 108 L48 52 L64 28 L80 52 L76 108 Z" fill="url(#towerGrad)" rx="2"/>

  <!-- Tower windows -->
  <rect x="56" y="56" width="16" height="8" rx="2" fill="#1E1E2E" opacity="0.7"/>
  <rect x="55" y="72" width="18" height="8" rx="2" fill="#1E1E2E" opacity="0.7"/>
  <rect x="54" y="88" width="20" height="8" rx="2" fill="#1E1E2E" opacity="0.7"/>

  <!-- Tower top beacon -->
  <circle cx="64" cy="28" r="6" fill="#85D4A0"/>
  <circle cx="64" cy="28" r="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Signal waves (left) -->
  <path d="M44 24 A28 28 0 0 0 38 36" stroke="url(#signalGrad2)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M38 20 A36 36 0 0 0 30 36" stroke="url(#signalGrad2)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M32 16 A44 44 0 0 0 22 36" stroke="url(#signalGrad2)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Signal waves (right) -->
  <path d="M84 24 A28 28 0 0 1 90 36" stroke="url(#signalGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M90 20 A36 36 0 0 1 98 36" stroke="url(#signalGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M96 16 A44 44 0 0 1 106 36" stroke="url(#signalGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Tower base -->
  <rect x="46" y="108" width="36" height="6" rx="3" fill="url(#towerGrad)" opacity="0.9"/>
</svg>
